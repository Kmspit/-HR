<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0d14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="เค เอ็ม เซอร์วิส พลัส" />
<title>เข้าสู่ระบบ — เค เอ็ม เซอร์วิส พลัส</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-mark" style="width: 50px; height: 50px; font-size: 24px;">⚡</div>
        <div class="logo-text" style="font-size: 18px;">เค เอ็ม เซอร์วิส พลัส</div>
      </div>
      
      <div class="auth-header">
        <h1>ยินดีต้อนรับกลับ</h1>
        <p>กรุณาเข้าสู่ระบบเพื่อจัดการงานของคุณ</p>
      </div>

      <div id="login-error" style="display:none; background: rgba(239,68,68,0.12); border:1px solid var(--red); border-radius: var(--r); padding: 10px 14px; font-size: 13px; color: var(--red); margin-bottom: 16px;"></div>

      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group" style="margin-bottom: 18px;">
          <label>อีเมลพนักงาน</label>
          <input id="login-email" type="email" class="form-input" placeholder="name@company.com" required data-english-only>
          <p id="login-email-error" class="field-error" style="display:none; margin-top:6px; font-size:12px; color:var(--red);"></p>
        </div>
        
        <div class="form-group" style="margin-bottom: 18px;">
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <label>รหัสผ่าน</label>
            <a href="forgot-password.html" class="auth-link" style="font-size: 12px;">ลืมรหัสผ่าน?</a>
          </div>
          <input id="login-password" type="password" class="form-input" placeholder="••••••••" required data-english-only>
          <p id="login-password-error" class="field-error" style="display:none; margin-top:6px; font-size:12px; color:var(--red);"></p>
        </div>

        <div class="form-group" style="margin-bottom: 24px;">
          <div style="display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" id="remember" style="accent-color: var(--accent);">
            <label for="remember" style="font-size: 13px; color: var(--text2); cursor: pointer;">จดจำการเข้าสู่ระบบ</label>
          </div>
        </div>

        <button type="submit" class="btn-primary" style="width: 100%; height: 48px; font-size: 16px; justify-content: center;">
          เข้าสู่ระบบ
        </button>
      </form>

      <div style="margin-top: 20px; padding: 14px; background: var(--bg2); border-radius: var(--r); font-size: 12px; color: var(--text3);">
        <div style="font-weight: 600; margin-bottom: 8px; color: var(--text2);">บัญชีทดสอบ (Demo)</div>
        <div>manager@demo.com / admin@demo.com</div>
        <div>employee@demo.com / lawyer@demo.com</div>
        <div style="margin-top: 4px;">รหัสผ่าน: <strong style="color:var(--text2)">demo1234</strong></div>
      </div>

      <div class="auth-footer">
        ยังไม่มีบัญชี? <a href="#" class="auth-link">ติดต่อฝ่ายบุคคล</a>
      </div>
    </div>
  </div>

<script src="english-input.js"></script>
<script>
const DEMO_ACCOUNTS = {
  'manager@demo.com': { name: 'สมหญิง ประสาน', role: 'MANAGER_HR', dept: 'HR' },
  'admin@demo.com':   { name: 'สมชาย อนุมัติ',  role: 'ADMIN',      dept: 'IT' },
  'employee@demo.com':{ name: 'มานี รักงาน',    role: 'EMPLOYEE',   dept: 'Marketing' },
  'lawyer@demo.com':  { name: 'วิชัย กฎหมาย',  role: 'LAWYER',     dept: 'Legal' },
};
const DEMO_PASS = 'demo1234';

const validateLoginEmail = bindEnglishInput('login-email', 'login-email-error');
const validateLoginPassword = bindEnglishInput('login-password', 'login-password-error');

function handleLogin(e) {
  e.preventDefault();
  const emailOk = validateLoginEmail();
  const passwordOk = validateLoginPassword();
  if (!emailOk || !passwordOk) return;

  const email    = document.getElementById('login-email').value.trim().toLowerCase();
  const password = document.getElementById('login-password').value;
  const errEl    = document.getElementById('login-error');

  // Demo login validation
  const account = DEMO_ACCOUNTS[email];
  const storedKey = 'hrflow_demo_pass_' + email;
  const expectedPass = localStorage.getItem(storedKey) || DEMO_PASS;
  if (!account || password !== expectedPass) {
    errEl.textContent = 'อีเมลหรือรหัสผ่านไม่ถูกต้อง กรุณาใช้บัญชีทดสอบ';
    errEl.style.display = 'block';
    return;
  }

  errEl.style.display = 'none';

  const user = { ...account, email, role: account.role };
  try {
    localStorage.setItem('hrflow_user', JSON.stringify(user));
  } catch (e) {
    console.warn('[login] localStorage.setItem failed:', e);
  }

  // Route based on role
  const routes = {
    MANAGER_HR: 'index.html',
    ADMIN:      'index.html',
    EMPLOYEE:   'attendance.html',
    LAWYER:     'out-of-office.html',
  };
  window.location.href = routes[user.role] || 'index.html';
}
</script>
<script src="dev-banner.js"></script>
</body>
</html>
