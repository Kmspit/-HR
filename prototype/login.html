<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0d14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="เค เอ็ม เซอร์วิส พลัส" />
<title>เข้าสู่ระบบ — เค เอ็ม เซอร์วิส พลัส</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-mark" style="width: 50px; height: 50px; font-size: 24px;">⚡</div>
        <div class="logo-text" style="font-size: 18px;">เค เอ็ม เซอร์วิส พลัส</div>
      </div>
      
      <div class="auth-header">
        <h1>ยินดีต้อนรับกลับ</h1>
        <p>กรุณาเข้าสู่ระบบเพื่อจัดการงานของคุณ</p>
      </div>

      <div id="login-error" style="display:none; background: rgba(239,68,68,0.12); border:1px solid var(--red); border-radius: var(--r); padding: 10px 14px; font-size: 13px; color: var(--red); margin-bottom: 16px;"></div>

      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group" style="margin-bottom: 18px;">
          <label>อีเมลพนักงาน</label>
          <input id="login-email" type="email" class="form-input" placeholder="name@company.com" required>
        </div>
        
        <div class="form-group" style="margin-bottom: 18px;">
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <label>รหัสผ่าน</label>
            <a href="forgot-password.html" class="auth-link" style="font-size: 12px;">ลืมรหัสผ่าน?</a>
          </div>
          <input id="login-password" type="password" class="form-input" placeholder="••••••••" required>
        </div>

        <div class="form-group" style="margin-bottom: 18px;">
          <label>ตำแหน่ง / Role</label>
          <select id="login-role" class="form-input" required>
            <option value="">— เลือกตำแหน่ง —</option>
            <option value="MANAGER_HR">👔 ผู้จัดการ / HR</option>
            <option value="ADMIN">🔧 Admin (ผู้ดูแลระบบ)</option>
            <option value="EMPLOYEE">👤 พนักงาน</option>
            <option value="LAWYER">⚖️ ทนายความ</option>
          </select>
        </div>

        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 24px;">
          <input type="checkbox" id="remember" style="accent-color: var(--accent);">
          <label for="remember" style="font-size: 13px; color: var(--text2); cursor: pointer;">จดจำการเข้าสู่ระบบ</label>
        </div>

        <button type="submit" class="btn-primary" style="width: 100%; height: 48px; font-size: 16px; justify-content: center;">
          เข้าสู่ระบบ
        </button>
      </form>

      <div class="auth-footer">
        ยังไม่มีบัญชี? <a href="#" class="auth-link">ติดต่อฝ่ายบุคคล</a>
      </div>
    </div>
  </div>

<script>
function handleLogin(e) {
  e.preventDefault();
  const errEl = document.getElementById('login-error');
  errEl.textContent = 'หน้านี้เป็นต้นแบบ HTML เท่านั้น กรุณาเข้าสู่ระบบที่แอปหลัก';
  errEl.style.display = 'block';
}
</script>
<script src="dev-banner.js"></script>
</body>
</html>
