<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0d14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="เค เอ็ม เซอร์วิส พลัส" />
<title>กฎบริษัท — เค เอ็ม เซอร์วิส พลัส</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo"><div class="logo-mark">⚡</div><div class="logo-text">เค เอ็ม เซอร์วิส พลัส</div></div>
  <nav class="sidebar-nav"></nav>
</aside>

<div class="main">
  <header class="topbar">
    <button type="button" class="hamburger" aria-label="เปิดเมนู" onclick="openSidebar()">☰</button>
    <div class="topbar-title">กฎบริษัท <span class="topbar-subtitle">/ นโยบายและระเบียบปฏิบัติ</span></div>
    <div class="topbar-actions">
      <button class="btn-primary role-hr-admin-only" onclick="openUploadRuleModal()">⬆️ อัปโหลดกฎใหม่</button>
    </div>
  </header>

  <main class="content">
    <div class="card">
      <div class="card-header">
        <span class="card-title">📑 เอกสารบริษัท</span>
        <input id="rules-search" class="form-input" style="height:32px;font-size:12px;width:200px;" placeholder="ค้นหา..." oninput="renderRules()">
      </div>
      <div id="rules-list"></div>
    </div>
  </main>
</div>

<nav class="mobile-nav">
  <div class="mobile-nav-grid">
    <a href="index.html" class="mnav-item"><span class="icon">📊</span>หน้าหลัก</a>
    <a href="attendance.html" class="mnav-item"><span class="icon">⏱️</span>เช็คอิน</a>
    <a href="leave.html" class="mnav-item"><span class="icon">📅</span>ลา</a>
    <a href="payroll.html" class="mnav-item"><span class="icon">💰</span>เงินเดือน</a>
    <a href="manual.html" class="mnav-item"><span class="icon">📖</span>คู่มือ</a>
    <a href="settings.html" class="mnav-item"><span class="icon">⚙️</span>ตั้งค่า</a>
  </div>
</nav>

<script src="hr-core.js"></script>
<script>
const RULES_KEY = 'companyRules';
function getRules() { return lsGet(RULES_KEY, []); }
function saveRules(r) { lsSet(RULES_KEY, r); }

const FILE_ICONS = { pdf: '📄', docx: '📝', doc: '📝', xlsx: '📊', xls: '📊', png: '🖼️', jpg: '🖼️', jpeg: '🖼️' };
function fileIcon(name) { const ext = (name||'').split('.').pop().toLowerCase(); return FILE_ICONS[ext] || '📎'; }

function renderRules() {
  const user = typeof getCurrentUser === 'function' ? getCurrentUser() : null;
  const isHR = user && (user.role === 'MANAGER_HR' || user.role === 'ADMIN');
  const search = (document.getElementById('rules-search')?.value || '').toLowerCase();
  let rules = getRules();

  // seed defaults if empty
  if (!rules.length) {
    rules = [
      { id: 'r1', title: 'ระเบียบวินัยพนักงาน', category: 'นโยบาย', version: 'v1.0', uploadedBy: 'HR', updatedAt: '2569-01-01', _fileData: null, _fileName: null },
      { id: 'r2', title: 'นโยบาย PDPA', category: 'กฎหมาย', version: 'v1.0', uploadedBy: 'HR', updatedAt: '2569-02-10', _fileData: null, _fileName: null },
    ];
    saveRules(rules);
  }

  if (search) rules = rules.filter(r => r.title.toLowerCase().includes(search) || (r.category||'').toLowerCase().includes(search));

  const el = document.getElementById('rules-list');
  if (!rules.length) { el.innerHTML = '<div style="padding:24px;text-align:center;color:var(--text3);">ไม่พบเอกสาร</div>'; return; }

  el.innerHTML = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;padding:12px 0;">` +
    rules.map(function(r) {
      const icon = r._fileName ? fileIcon(r._fileName) : '📋';
      const updated = r.updatedAt ? new Date(r.updatedAt).toLocaleDateString('th-TH', { year:'numeric', month:'short', day:'numeric', timeZone:'Asia/Bangkok' }) : '—';
      const versions = (r.history || []).length + 1;
      return `<div style="border:1px solid var(--border);border-radius:12px;padding:16px;background:var(--bg2);cursor:pointer;transition:transform .15s;" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform=''" >
        <div style="font-size:28px;margin-bottom:8px;">${icon}</div>
        <div style="font-weight:700;font-size:14px;margin-bottom:4px;">${r.title}</div>
        <div style="font-size:11px;color:var(--text3);margin-bottom:8px;">${r.category||'ทั่วไป'} · ${r.version||'v1.0'} · ${updated}</div>
        <div style="font-size:10px;color:var(--text3);margin-bottom:10px;">อัปโหลดโดย: ${r.uploadedBy||'HR'} · ${versions} เวอร์ชัน</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          ${r._fileData
            ? `<button onclick="viewRuleFile('${r.id}')" class="btn-sm" style="color:var(--accent);">👁 ดู</button>
               <a href="${r._fileData}" download="${r._fileName||r.title}" class="btn-sm" style="color:var(--green);text-decoration:none;">⬇ ดาวน์โหลด</a>`
            : `<button class="btn-sm" style="color:var(--text3);pointer-events:none;">ไม่มีไฟล์</button>`}
          ${isHR ? `<button onclick="openUploadRuleModal('${r.id}')" class="btn-sm" style="color:var(--orange);">✏️ อัปเดต</button>
                    <button onclick="deleteRule('${r.id}')" class="btn-sm" style="color:var(--red);">🗑️ ลบ</button>` : ''}
        </div>
      </div>`;
    }).join('') + '</div>';
}

function viewRuleFile(id) {
  const r = getRules().find(x => x.id === id);
  if (!r || !r._fileData) { alert('ไม่มีไฟล์'); return; }
  const isPdf = (r._fileName||'').toLowerCase().endsWith('.pdf');
  openModal(`
    <h3>${fileIcon(r._fileName||'')} ${r.title}</h3>
    <div style="font-size:12px;color:var(--text3);margin-bottom:10px;">${r.version||'v1.0'} · ${r.category||''} · อัปโหลดโดย ${r.uploadedBy||'HR'}</div>
    <div style="width:100%;height:${isPdf?'65':'40'}vh;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--bg2);">
      ${isPdf
        ? `<iframe src="${r._fileData}" style="width:100%;height:100%;border:none;" title="${r.title}"></iframe>`
        : `<img src="${r._fileData}" style="width:100%;height:100%;object-fit:contain;" alt="${r.title}">`}
    </div>
    <div style="display:flex;gap:8px;margin-top:12px;">
      <a href="${r._fileData}" download="${r._fileName||r.title}" class="btn-primary" style="flex:1;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;height:40px;border-radius:10px;">⬇️ ดาวน์โหลด</a>
      <a href="${r._fileData}" target="_blank" class="btn-outline" style="flex:1;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;height:40px;border-radius:10px;">🔍 เปิดเต็มจอ</a>
      <button class="btn-outline" style="flex:1;" onclick="this.closest('.modal-backdrop').remove()">ปิด</button>
    </div>
  `);
}

function deleteRule(id) {
  if (!confirm('ต้องการลบเอกสารนี้?')) return;
  saveRules(getRules().filter(r => r.id !== id));
  renderRules();
}

function readFileAsDataUrlRules(file) {
  return new Promise(function(res, rej) {
    const fr = new FileReader(); fr.onload = e => res(e.target.result); fr.onerror = rej; fr.readAsDataURL(file);
  });
}

function openUploadRuleModal(editId) {
  const existing = editId ? getRules().find(r => r.id === editId) : null;
  openModal(`
    <h3>${existing ? '✏️ อัปเดตเอกสาร' : '⬆️ อัปโหลดเอกสารใหม่'}</h3>
    <div class="form-group" style="margin-bottom:12px"><label>ชื่อเอกสาร *</label>
      <input id="ru-title" class="form-input" placeholder="ชื่อ..." value="${existing ? existing.title : ''}"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;">
      <div class="form-group"><label>หมวดหมู่</label>
        <input id="ru-cat" class="form-input" placeholder="นโยบาย / กฎหมาย..." value="${existing ? existing.category||'' : ''}"></div>
      <div class="form-group"><label>เวอร์ชัน</label>
        <input id="ru-ver" class="form-input" placeholder="v1.0" value="${existing ? existing.version||'' : 'v1.0'}"></div>
    </div>
    <div class="form-group" style="margin-bottom:16px"><label>ไฟล์ (PDF / DOCX / รูป) ${existing ? '— ไม่เลือกถ้าไม่ต้องการเปลี่ยน' : '*'}</label>
      <input type="file" id="ru-file" class="form-input" accept=".pdf,.docx,.doc,.xlsx,.xls,.png,.jpg,.jpeg" style="padding:6px;"></div>
    <div style="display:flex;gap:10px;">
      <button class="btn-primary" style="flex:1;" onclick="saveRule('${editId||''}')">💾 บันทึก</button>
      <button class="btn-outline" style="flex:1;" onclick="this.closest('.modal-backdrop').remove()">ยกเลิก</button>
    </div>
  `);
}

async function saveRule(editId) {
  const user = typeof getCurrentUser === 'function' ? getCurrentUser() : null;
  const title = document.getElementById('ru-title')?.value.trim();
  const cat   = document.getElementById('ru-cat')?.value.trim() || 'ทั่วไป';
  const ver   = document.getElementById('ru-ver')?.value.trim() || 'v1.0';
  const fileEl = document.getElementById('ru-file');
  if (!title) { alert('กรุณากรอกชื่อเอกสาร'); return; }

  const rules = getRules();
  let rule = editId ? rules.find(r => r.id === editId) : null;

  if (fileEl?.files?.[0]) {
    const f = fileEl.files[0];
    const data = await readFileAsDataUrlRules(f);
    if (rule) {
      // บันทึก version history
      if (!rule.history) rule.history = [];
      rule.history.push({ version: rule.version, uploadedAt: rule.updatedAt, uploadedBy: rule.uploadedBy });
      rule._fileData = data;
      rule._fileName = f.name;
    } else {
      rule = { id: uid(), _fileData: data, _fileName: f.name };
    }
  } else if (!editId) {
    alert('กรุณาเลือกไฟล์'); return;
  }
  if (!rule) return;
  rule.title = title;
  rule.category = cat;
  rule.version = ver;
  rule.uploadedBy = user?.name || 'HR';
  rule.updatedAt = new Date().toISOString().slice(0,10);
  if (!editId) rules.push(rule);
  saveRules(rules);
  document.querySelector('.modal-backdrop')?.remove();
  renderRules();
}

document.addEventListener('DOMContentLoaded', function() {
  if (typeof initRole === 'function') initRole();
  renderRules();
});
</script>
<script src="dev-banner.js"></script>
</body>
</html>
