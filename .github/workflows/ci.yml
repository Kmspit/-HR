name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Audit module gates
        run: npm run audit:module-gates

      - name: Validate schema (static)
        run: node scripts/validate-schema-ci.mjs

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: file:./dev.db
          AUTH_SECRET: ci-test-secret-min-32-chars-long
          NEXTAUTH_SECRET: ci-test-secret-min-32-chars-long
          NEXTAUTH_URL: http://localhost:3000
