<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0d14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="เค เอ็ม เซอร์วิส พลัส" />
<title>ลืมรหัสผ่าน — เค เอ็ม เซอร์วิส พลัส</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <div style="font-size: 48px; margin-bottom: 16px;">🔑</div>
        <h1>Forgot Password?</h1>
        <p>ระบุอีเมลของคุณเพื่อรับลิงก์ตั้งรหัสผ่านใหม่</p>
      </div>

      <form>
        <div class="form-group" style="margin-bottom: 24px;">
          <label>อีเมลพนักงาน</label>
          <input id="forgot-email" type="email" class="form-input" placeholder="name@company.com" required data-english-only>
          <p id="forgot-email-error" style="display:none; margin-top:6px; font-size:12px; color:var(--red);"></p>
        </div>

        <button type="submit" class="btn-primary" style="width: 100%; height: 48px; font-size: 16px; justify-content: center;">
          ส่งลิงก์รีเซ็ตรหัสผ่าน
        </button>
      </form>

      <div class="auth-footer">
        <a href="login.html" class="auth-link" style="display: flex; align-items: center; justify-content: center; gap: 8px;">
          <span>←</span> กลับไปหน้าเข้าสู่ระบบ
        </a>
      </div>
    </div>
  </div>
<script src="english-input.js"></script>
<script>
const validateForgotEmail = bindEnglishInput('forgot-email', 'forgot-email-error');
document.querySelector('form').addEventListener('submit', function (e) {
  e.preventDefault();
  if (!validateForgotEmail()) return;
  alert('ระบบส่งลิงก์ไปยังอีเมลของคุณแล้ว');
  window.location.href = 'login.html';
});
</script>
<script src="dev-banner.js"></script>
</body>
</html>
